<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />

    <!--
      viewport — обязателен для адаптивности на мобильных.
      Раздел курсовой: 1.2 — "адаптивность интерфейса"
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Цвет строки браузера на Android -->
    <meta name="theme-color" content="#2563eb" />

    <!-- SEO и описание -->
    <meta name="description" content="Онлайн-запись в автосервис. Выберите услугу, мастера и удобное время." />

    <!-- PWA: иконка на главном экране iOS -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />

    <!-- PWA: манифест приложения -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>АвтоСервис Онлайн</title>
  </head>
  <body>
    <!--
      noscript — показывается если JavaScript отключён.
      React без JS не работает.
    -->
    <noscript>
      Для работы этого приложения необходимо включить JavaScript в браузере.
    </noscript>

    <!--
      div#root — точка монтирования React-приложения.
      React вставляет весь интерфейс внутрь этого элемента.
    -->
    <div id="root"></div>
  </body>
</html>
